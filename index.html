<!DOCTYPE html> <!-- DTD é o Document type Definition e informa para o navegador a versão do html que esta sendo carregada. Assim o navegador pode 
carregar um conjunto de bibliotecas de acordo com a versão específica --> 

<!-- ATRIBUTOS: 
Os atributos são do tipo chave = valor. 
Ex: Lang="pt-BR", isso é um atributo que pode ir em qualquer tag de conteúdo. <html lang="pt-BR"> ...</html>
-->

<html lang="pt-BR">
</html>
